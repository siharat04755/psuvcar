<style>

  .wrap{max-width:1080px;margin:0 auto;padding:0 18px 64px}

  .brand-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}

  .who .nm{font-weight:600}
  .rolebadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}

  .role-btn svg{width:14px;height:14px}
  nav.tabs{display:flex;gap:4px;margin-top:16px;flex-wrap:wrap}

  nav.tabs button.active{background:var(--bg);color:var(--ink)}
  nav.tabs button.active .badge{background:var(--brand-tint);color:var(--brand)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:20px}
  h2.sec{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 14px}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--brand-bright);text-transform:uppercase}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 6px}
  input,select,textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#FBFCFC}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand-bright);box-shadow:0 0 0 3px var(--brand-tint)}
  .field{margin-bottom:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .btn{appearance:none;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;padding:12px 18px;border-radius:10px;border:1.5px solid transparent;display:inline-flex;align-items:center;gap:8px;transition:transform .05s,background .15s}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55;cursor:wait}
  .btn-primary{background:var(--brand);color:#fff} .btn-primary:hover{background:#0F4034}
  .btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)} .btn-ghost:hover{border-color:var(--brand-bright);color:var(--brand)}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
  .btn-danger{color:var(--booked);background:#fff;border-color:#EAD2D2} .btn-danger:hover{background:#FBEEEE}
  .btn-ok{color:#fff;background:var(--available);border-color:transparent} .btn-ok:hover{background:#258055}
  .btn-block{width:100%;justify-content:center}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:18px;margin-top:18px}
  .read-ident{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px dashed var(--line);border-radius:10px;background:#F6F9F8;font-size:14px;margin-bottom:14px}
  .read-ident .avatar{width:26px;height:26px;font-size:12px}
  .read-ident a{color:var(--brand-bright);font-size:12.5px;font-weight:600;cursor:pointer;margin-left:auto}
  .car-list{display:flex;flex-direction:column;gap:10px}
  .car-card{display:flex;align-items:center;gap:14px;padding:14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;transition:border-color .15s}
  .car-card.ok{border-color:#BFE4D2;background:#F5FBF8} .car-card.busy{border-color:#EAD2D2;background:#FCF6F6}
  .car-ico{width:46px;height:46px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;background:var(--ink);color:#fff}
  .car-ico svg{width:26px;height:26px}
  .car-meta{flex:1;min-width:0}
  .car-meta .name{font-weight:600;font-size:15px}
  .car-meta .sub{font-size:12.5px;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:2px}

  .mine-item .meta{color:var(--ink-soft);font-size:12.5px}

  .req-main .when{font-weight:600;font-size:14.5px}
  .req-meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .req-purpose{font-size:13px;margin-top:4px}
  .req-detail{display:inline-block;margin-top:6px;font-size:12.5px;font-weight:600;color:var(--brand-bright);cursor:pointer}

  .reqbadge.patient{background:#FBE6E6;color:#A14040}
  .req-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .segment button.on{border-color:var(--brand);background:var(--brand-tint);color:var(--brand)}
  .segment button.on .seg-sub{color:var(--brand-bright)}
  .opt-group{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;cursor:pointer;font-size:14px;background:#FBFCFC}

  .opt.on{border-color:var(--brand);background:var(--brand-tint)}
  .opt input{width:auto;margin:2px 0 0;flex-shrink:0}
  .opt-inline{display:flex;gap:8px;flex-wrap:wrap}
  .opt-inline .opt{flex:1;min-width:120px}
  .file-drop{border:1.5px dashed var(--line);border-radius:10px;padding:14px;text-align:center;font-size:13px;color:var(--ink-soft);background:#FBFCFC}

  .file-drop label{display:inline-block;cursor:pointer;color:var(--brand-bright);font-weight:600}
  .file-status{font-size:12.5px;color:var(--available);margin-top:8px}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:38px 32px;max-width:380px;width:100%;text-align:center}
  .login-logo{width:64px;height:64px;border-radius:16px;background:var(--brand);color:#fff;display:grid;place-items:center;margin:0 auto 18px}
  .login-logo svg{width:36px;height:36px}
  .login-card h1{font-size:22px;margin:0 0 4px;color:var(--ink)}
  .login-sub{font-size:13px;color:var(--ink-soft);margin:0 0 20px}
  .login-hint{font-size:14px;color:var(--ink);margin:0 0 18px}
  .login-foot{font-size:11.5px;color:var(--cancel);margin:18px 0 0}
  .board-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .legend{display:flex;gap:14px;margin-left:auto;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .swatch{width:13px;height:13px;border-radius:4px;display:inline-block}
  .board-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .board{min-width:760px}
  .board-row{display:grid;grid-template-columns:150px 1fr;border-top:1px solid var(--line)}
  .board-row:first-child{border-top:0}
  .board-row.hours{background:#F4F7F6;position:sticky;top:0}
  .rowhead{padding:10px 12px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;gap:3px}
  .rowhead .name{font-size:13.5px;font-weight:600;line-height:1.25}
  .track{position:relative;height:52px;background-image:repeating-linear-gradient(to right,transparent,transparent calc(100%/14 - 1px),var(--line) calc(100%/14 - 1px),var(--line) calc(100%/14))}
  .hours .track{height:34px;background-image:none}
  .hourtick{position:absolute;top:0;bottom:0;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);padding:9px 0 0 4px;border-left:1px solid var(--line)}
  .block{position:absolute;top:7px;bottom:7px;border-radius:7px;padding:5px 8px;overflow:hidden;font-size:11.5px;line-height:1.2;color:#fff}
  .block.approved{background:var(--available)}
  .block.pending{background:var(--pending);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.18) 0 6px,transparent 6px 12px)}
  .block .bt{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .block .bp{font-family:'IBM Plex Mono',monospace;opacity:.9}
  .empty-track{display:grid;place-items:center;color:var(--cancel);font-size:12px;height:100%}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .filters .field{margin:0} .filters label{font-size:11px;margin-bottom:4px}
  .filters input,.filters select{padding:8px 10px;font-size:13.5px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:0 12px 10px;border-bottom:2px solid var(--line);font-weight:600;white-space:nowrap}

  tbody tr:hover{background:#F7FAF9}
  .tag{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
  .tag.pending{background:var(--pending-tint);color:#A66718}
  .tag.approved{background:#E2F4EB;color:#1E7A50}
  .tag.cancelled{background:#EEF1F1;color:var(--cancel)}
  tr.cancelled td:nth-child(-n+5){opacity:.5}
  .act-row{display:flex;gap:6px;flex-wrap:wrap}
  .empty-state{text-align:center;padding:48px 20px;color:var(--ink-soft)}
  .empty-state svg{width:46px;height:46px;opacity:.4;margin-bottom:10px}
  .empty-state.small{padding:24px 16px;font-size:13px}
  .alert{padding:12px 14px;border-radius:10px;font-size:13.5px;font-weight:500;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
  .alert.err{background:#FBE6E6;color:#9A3838;border:1px solid #EFD0D0}
  .alert.ok{background:#E2F4EB;color:#1E6E48;border:1px solid #C2E6D3}
  .bar{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;padding:10px 14px;border-radius:10px;margin:18px 0 0}
  .bar.ok{background:#E7F4EC;color:#1E6E48;border:1px solid #C8E6D5}
  .bar.warn{background:#FCF1DE;color:#8A5B16;border:1px solid #F0DCB4}
  .bar.err{background:#FBE6E6;color:#9A3838;border:1px solid #EFD0D0}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .dot.g{background:var(--available)} .dot.y{background:var(--pending)} .dot.r{background:var(--booked)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .row-add{display:grid;grid-template-columns:1.4fr 1fr 1fr .7fr auto;gap:10px;align-items:end}
  .overlay{position:fixed;inset:0;background:rgba(16,28,33,.55);display:grid;place-items:center;z-index:80;padding:18px}
  .modal{background:#fff;border-radius:16px;max-width:400px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 6px;font-size:19px}
  .modal p.lead{margin:0 0 18px;font-size:13.5px;color:var(--ink-soft)}
  .pin-input{letter-spacing:.5em;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:20px}
  @media (max-width:860px){.layout{grid-template-columns:1fr}.row-add{grid-template-columns:1fr 1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:3px solid var(--brand-bright);outline-offset:2px}
</style>
</head>

let conn={ok:false,demo:!REMOTE,error:null,last:null}, busy=false;

const _mem={};
function lsGet(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return (k in _mem)?_mem[k]:null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ _mem[k]=v; } }

async function apiLoad(){
  if(!REMOTE) return demoLoad();
  const r=await fetch(BACKEND_URL+"?action=load&token="+encodeURIComponent(APP_TOKEN),{method:"GET"});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"load failed");
  return { cars:j.cars||[], drivers:j.drivers||[], bookings:j.bookings||[], config:j.config||{} };
}
async function apiPost(payload){
  if(!REMOTE) return demoPost(payload);
  payload.token=APP_TOKEN;
  if(GOOGLE){
    const tok=await ensureToken();
    if(!tok){ return {ok:false,error:"auth"}; }
    payload.idToken=tok;
  }
  try{ const r=await fetch(BACKEND_URL,{method:"POST",body:JSON.stringify(payload)}); let j; try{ j=await r.json(); }catch(e){ return {ok:true}; }
    if(j && j.error==="auth"){ idToken=null; promptSignIn(); toast("เซสชันหมดอายุ กรุณาลงชื่อเข้าใช้อีกครั้งแล้วลองใหม่"); }
    return j||{ok:true}; }
  catch(e){ return {ok:false,error:String(e.message||e)}; }
}
function demoLoad(){ const s=lsGet("fleet:demo")||{}; let c=s.cars; if(!c||!c.length) c=JSON.parse(JSON.stringify(SEED_CARS)); let dv=s.drivers; if(!dv||!dv.length) dv=JSON.parse(JSON.stringify(SEED_DRIVERS)); return Promise.resolve({cars:c,drivers:dv,bookings:s.bookings||[],config:s.config||{}}); }
function demoSave(){ lsSet("fleet:demo",{cars,drivers,bookings,config}); }
function demoPost(p){
  if(p.action==="addBooking"){
    bookings.push({id:p.id,reqType:p.reqType||"",carId:p.carId||"",driverId:p.driverId||"",date:p.date,start:p.start,end:p.end,driver:p.driver,owner:p.owner,ownerEmail:p.ownerEmail||"",dept:p.dept||"",phone:p.phone||"",purpose:p.purpose||"",location:p.location||"",fileUrl:p.fileUrl||"",fileName:p.fileName||"",details:p.details||"",status:p.status,created:p.created});
  } else if(p.action==="assignCar"){
    const t=bookings.find(x=>x.id===p.id);
    if(t){ const carClash=bookings.some(x=>x.id!==t.id&&String(x.carId)===String(p.carId)&&x.status!=="cancelled"&&x.date===t.date&&overlap(toMin(t.start),toMin(t.end),toMin(x.start),toMin(x.end)));
      if(carClash) return Promise.resolve({ok:false,error:"conflict"});
      if(p.driverId){ const drvClash=bookings.some(x=>x.id!==t.id&&String(x.driverId)===String(p.driverId)&&x.status!=="cancelled"&&x.date===t.date&&overlap(toMin(t.start),toMin(t.end),toMin(x.start),toMin(x.end)));
        if(drvClash) return Promise.resolve({ok:false,error:"driverbusy"}); }
      t.carId=p.carId; t.driverId=p.driverId||""; t.status="approved"; }
  } else if(p.action==="updateStatus"){ const b=bookings.find(x=>x.id===p.id); if(b) b.status=p.status; }
  else if(p.action==="deleteBooking"){ bookings=bookings.filter(x=>x.id!==p.id); }
  else if(p.action==="addCar"){ if(cars.some(c=>c.plate===p.plate)) return Promise.resolve({ok:false,error:"dupplate"}); cars.push({id:p.id,name:p.name,plate:p.plate,type:p.type,seats:p.seats}); }
  else if(p.action==="deleteCar"){ cars=cars.filter(c=>c.id!==p.id); bookings=bookings.filter(b=>b.carId!==p.id); }
  else if(p.action==="addDriver"){ drivers.push({id:p.id,name:p.name,phone:p.phone||""}); }
  else if(p.action==="deleteDriver"){ drivers=drivers.filter(d=>d.id!==p.id); bookings.forEach(b=>{ if(String(b.driverId)===String(p.id)) b.driverId=""; }); }
  else if(p.action==="setConfig"){ config[p.key]=p.value; }
  demoSave(); return Promise.resolve({ok:true});
}
/* แปลงค่าวันที่/เวลาที่อาจกลับมาในรูปแบบ Date object หรือ ISO string ให้เป็นข้อความสะอาด */
function normDate(v){
  if(v==null||v==="") return "";
  const s=String(v);
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d=new Date(s);
  if(!isNaN(d.getTime())) return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return s;
}
function normTime(v){
  if(v==null||v==="") return "";
  const s=String(v);
  const m=s.match(/^(\d{1,2}):(\d{2})/); if(m) return m[1].padStart(2,"0")+":"+m[2];
  const d=new Date(s);
  if(!isNaN(d.getTime())) return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  return s;
}
function normBooking(b){ let d={}; try{ d=b.details?JSON.parse(b.details):{}; }catch(e){ d={}; } return Object.assign({}, b, {date:normDate(b.date), start:normTime(b.start), end:normTime(b.end), detailsObj:d}); }

async function refresh(){
  try{ const d=await apiLoad(); cars=d.cars||[]; drivers=d.drivers||[]; bookings=(d.bookings||[]).map(normBooking); config=d.config||{}; conn.ok=true; conn.error=null; conn.last=new Date(); }
  catch(e){ conn.ok=false; conn.error=String(e.message||e); }
  applyRole();
  render();
}

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function uid(){ return "b"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function toMin(t){ const [h,m]=String(t).split(":").map(Number); return h*60+m; }
function overlap(a1,a2,b1,b2){ return a1<b2 && b1<a2; }
function carById(id){ return cars.find(c=>String(c.id)===String(id)); }
function driverById(id){ return drivers.find(d=>String(d.id)===String(id)); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function thaiDate(s){ const d=new Date(s+"T00:00:00"),dy=["อา","จ","อ","พ","พฤ","ศ","ส"],mo=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."]; return `${dy[d.getDay()]} ${d.getDate()} ${mo[d.getMonth()]} ${(d.getFullYear()+543)%100}`; }
function activeBookings(){ return bookings.filter(b=>b.status!=="cancelled"); }
/* รถที่ "กันเวลา" คือรถที่ถูกจัดสรรแล้ว (มี carId และไม่ถูกยกเลิก) */
function blockingBookings(){ return bookings.filter(b=>b.carId && b.status!=="cancelled"); }
function carConflict(carId,date,start,end,exceptId){ const s=toMin(start),e=toMin(end); return blockingBookings().find(b=>String(b.carId)===String(carId)&&b.date===date&&b.id!==exceptId&&overlap(s,e,toMin(b.start),toMin(b.end))); }
/* คืนรายการรถที่ว่างในช่วงเวลาที่กำหนด (ไม่ชนกับการจัดสรรอื่น) */
function freeCarsFor(date,start,end,exceptId){ return cars.filter(c=>!carConflict(c.id,date,start,end,exceptId)); }
/* คนขับชนเวลา / คนขับที่ว่าง */
function driverConflict(driverId,date,start,end,exceptId){ if(!driverId) return null; const s=toMin(start),e=toMin(end); return blockingBookings().find(b=>String(b.driverId)===String(driverId)&&b.date===date&&b.id!==exceptId&&overlap(s,e,toMin(b.start),toMin(b.end))); }
function freeDriversFor(date,start,end,exceptId){ return drivers.filter(d=>!driverConflict(d.id,date,start,end,exceptId)); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2600); }

/* ===== โหมดทดลอง: กรอกชื่อ + สลับผู้ดูแลแบบไม่มี PIN (ใช้ตอนยังไม่ตั้ง Google Login) ===== */
function askName(force){
  openModal(`<h3>ยินดีต้อนรับ</h3>
    <p class="lead">โหมดทดลอง (ยังไม่ได้ตั้ง Google Login) — ใส่ชื่อเพื่อทดสอบระบบ</p>
    <div class="field"><label for="nm">ชื่อ–สกุล / ชื่อเล่น</label><input type="text" id="nm" placeholder="เช่น สมชาย ใจดี" value="${me?esc(me.name):""}"></div>
    <div id="nm-err"></div><button class="btn btn-primary btn-block" id="nm-save">เริ่มใช้งาน</button>`);
  if(force) document.getElementById("ov").dataset.lock="1";
  const input=document.getElementById("nm"); input.focus();
  const save=()=>{ const v=input.value.trim(); if(!v){ document.getElementById("nm-err").innerHTML=`<div class="alert err">กรุณาใส่ชื่อ</div>`; return; } me={name:v,email:""}; lsSet("fleet:me",me); closeModal(); toast("บันทึกชื่อแล้ว · "+v); render(); };
  document.getElementById("nm-save").addEventListener("click",save);
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") save(); });
}
function toggleDemoAdmin(){ role=(role==="admin")?"user":"admin"; if(role!=="admin"&&view==="admin") view="book"; toast(role==="admin"?"เข้าโหมดผู้ดูแล (ทดลอง)":"ออกจากโหมดผู้ดูแล"); render(); }

/* ===== Google Sign-In (โหมดใช้งานจริง) ===== */
function decodeJwt(t){ try{ const p=t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"); const json=decodeURIComponent(atob(p).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join("")); return JSON.parse(json); }catch(e){ return null; } }
function adminSet(){ const set=new Set(); (ADMIN_EMAILS||[]).forEach(e=>{ if(e) set.add(String(e).toLowerCase()); }); const extra=config.adminEmails; if(extra && typeof extra==="string"){ extra.split(/[,\s]+/).forEach(e=>{ if(e) set.add(e.toLowerCase()); }); } return set; }
function isAdminEmail(email){ return adminSet().has(String(email||"").toLowerCase()); }
function applyRole(){ if(GOOGLE) role=(me&&isAdminEmail(me.email))?"admin":"user"; }
function tokenValid(){ if(!idToken||!me||!me.exp) return false; return (Date.now()/1000) < (me.exp-60); }
let tokenWaiters=[];
function ensureToken(){
  if(tokenValid()) return Promise.resolve(idToken);
  return new Promise(resolve=>{
    tokenWaiters.push(resolve);
    try{ google.accounts.id.prompt(); }catch(e){}
    setTimeout(()=>{ const i=tokenWaiters.indexOf(resolve); if(i>=0){ tokenWaiters.splice(i,1); resolve(tokenValid()?idToken:null); } },4000);
  });
}
function handleCredential(resp){
  const p=decodeJwt(resp.credential);
  if(!p){ renderLogin("ลงชื่อเข้าใช้ไม่สำเร็จ ลองใหม่อีกครั้ง"); return; }
  const email=String(p.email||"").toLowerCase(), dom=email.split("@")[1]||"";
  if(p.aud!==GOOGLE_CLIENT_ID || !p.email_verified || (ALLOWED_DOMAIN && dom!==ALLOWED_DOMAIN.toLowerCase())){
    idToken=null; me=null; try{ google.accounts.id.disableAutoSelect(); }catch(e){}
    renderLogin(`บัญชีนี้ใช้ไม่ได้ — ต้องเป็นอีเมล @${ALLOWED_DOMAIN} เท่านั้น`); return;
  }
  idToken=resp.credential;
  me={name:p.name||email, email:email, picture:p.picture||"", exp:p.exp};
  lsSet("fleet:me",{name:me.name,email:me.email,picture:me.picture});
  const ws=tokenWaiters.slice(); tokenWaiters=[]; ws.forEach(r=>r(idToken));
  applyRole(); hideLogin(); refresh();
}
function initGoogle(){
  if(typeof google==="undefined"||!google.accounts||!google.accounts.id){ return setTimeout(initGoogle,300); }
  google.accounts.id.initialize({ client_id:GOOGLE_CLIENT_ID, callback:handleCredential, auto_select:true, hd:ALLOWED_DOMAIN, cancel_on_tap_outside:false });
  if(!me||!idToken) renderLogin("");
  try{ google.accounts.id.prompt(); }catch(e){}
}
function promptSignIn(){ if(!GOOGLE) return; renderLogin(""); try{ google.accounts.id.prompt(); }catch(e){} }
function signOut(){ try{ google.accounts.id.disableAutoSelect(); }catch(e){} idToken=null; me=null; role="user"; try{ localStorage.removeItem("fleet:me"); }catch(e){} renderLogin(""); }
function renderLogin(msg){
  const hdr=document.querySelector("header.top"), wrap=document.querySelector(".wrap");
  if(hdr) hdr.style.display="none"; if(wrap) wrap.style.display="none";
  const el=document.getElementById("login-screen"); if(!el) return; el.hidden=false; el.style.display="flex";
  el.innerHTML=`<div class="login-card">
    <div class="login-logo">${carSvg}</div>
    <h1>รถส่วนกลาง</h1>
    <p class="login-sub">ระบบจองรถของออฟฟิศ · Pool Car Dispatch</p>
    <p class="login-hint">ลงชื่อเข้าใช้ด้วยอีเมลองค์กร <b>@${esc(ALLOWED_DOMAIN)}</b></p>
    ${msg?`<div class="alert err" style="text-align:left">${esc(msg)}</div>`:""}
    <div id="gbtn" style="display:flex;justify-content:center;margin-top:6px"></div>
    <p class="login-foot">เฉพาะบัญชีในองค์กรเท่านั้น</p>
  </div>`;
  try{ google.accounts.id.renderButton(document.getElementById("gbtn"),{theme:"filled_blue",size:"large",shape:"pill",text:"signin_with",width:260}); }catch(e){}
}
function hideLogin(){ const el=document.getElementById("login-screen"); if(el){ el.hidden=true; el.style.display="none"; } const hdr=document.querySelector("header.top"), wrap=document.querySelector(".wrap"); if(hdr) hdr.style.display=""; if(wrap) wrap.style.display=""; }

async function uploadAttachment(inputEl){
  const file=inputEl.files&&inputEl.files[0]; if(!file) return;
  const status=document.getElementById("file-status");
  if(file.size>4*1024*1024){ if(status) status.textContent="ไฟล์ใหญ่เกิน 4MB"; inputEl.value=""; return; }
  if(status){ status.style.color="var(--ink-soft)"; status.textContent="กำลังอัปโหลด…"; }
  let b64;
  try{ b64=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(",")[1]); r.onerror=rej; r.readAsDataURL(file); }); }
  catch(e){ if(status) status.textContent="อ่านไฟล์ไม่สำเร็จ"; return; }
  if(!REMOTE){ form.fileName=file.name; form.fileUrl="(ทดลอง)"; if(status){ status.style.color="var(--available)"; status.textContent="แนบแล้ว (ทดลอง): "+file.name; } return; }
  const res=await apiPost({action:"uploadFile",name:file.name,mime:file.type||"application/octet-stream",dataBase64:b64});
  if(!res.ok||!res.url){ if(status){ status.style.color="var(--booked)"; status.textContent="อัปโหลดไม่สำเร็จ"; } return; }
  form.fileUrl=res.url; form.fileName=file.name; if(status){ status.style.color="var(--available)"; status.textContent="แนบแล้ว: "+file.name; }
}
async function submitRequest(){
  if(busy) return;
  const box=document.getElementById("book-alert"), errs=[];
  const date=fv("date")||todayStr(), start=fv("start")||"09:00", end=fv("end")||"12:00";
  if(!fv("dept")) errs.push("ระบุแผนกที่ขอใช้รถ");
  if(!fv("phone")) errs.push("กรอกเบอร์ติดต่อกลับ");
  if(toMin(end)<=toMin(start)) errs.push("เวลากลับต้องอยู่หลังเวลาไป");
  let purpose="", details={};
  if(reqType==="admin"){
    if(!fv("vehicleType")) errs.push("เลือกประเภทรถ");
    if(!fv("purpose")) errs.push("ระบุวัตถุประสงค์/รายละเอียดงาน");
    if(!fv("hasStaff")) errs.push("ระบุว่ามีเจ้าหน้าที่ไปกับรถหรือไม่");
    if(fv("hasStaff")==="มี" && !fv("personnel")) errs.push("เลือกบุคลากรที่ไปด้วย");
    purpose=fv("purpose");
    details={reqType:"admin", vehicleType:fv("vehicleType"), coordinator:fv("coord"), coordPhone:fv("coordPhone"),
      hasStaff:fv("hasStaff"), personnel:(fv("hasStaff")==="มี"?fv("personnel"):""),
      equip:(fv("hasStaff")==="มี"?(form.adminEquip||[]).slice():[]),
      equipOther:(fv("hasStaff")==="มี"&&form.adminEquipOther?fv("adminEquipOtherText"):"")};
  } else {
    if(!fv("jobType")) errs.push("เลือกประเภทงาน");
    if(!fv("patientName")) errs.push("กรอกชื่อผู้ป่วย");
    if(!fv("hn")) errs.push("กรอก HN ผู้ป่วย");
    purpose=`${fv("jobType")||""}${fv("patientName")?" · "+fv("patientName"):""}`;
    details={reqType:"patient", jobType:fv("jobType"), patientName:fv("patientName"), hn:fv("hn"), diagnosis:fv("diagnosis"),
      needDoctor:fv("needDoctor"), equip:(form.patientEquip||[]).slice(),
      equipOther:(form.patientEquipOther?fv("patientEquipOtherText"):"")};
  }
  if(errs.length){ box.innerHTML=`<div class="alert err">${errs.join(" · ")}</div>`; return; }
  busy=true; toast("กำลังส่งคำขอ…");
  const res=await apiPost({action:"addBooking",id:uid(),reqType,carId:"",driverId:"",date,start,end,
    driver:me.name,owner:me.name,ownerEmail:(me.email||""),dept:fv("dept"),phone:fv("phone"),
    purpose,location:fv("location"),fileUrl:(form.fileUrl||""),fileName:(form.fileName||""),
    details:JSON.stringify(details),status:"pending",created:Date.now()});
  busy=false;
  if(!res.ok){ box.innerHTML=`<div class="alert err">${res.error==="auth"?"เซสชันหมดอายุ ลงชื่อเข้าใช้ใหม่แล้วลองอีกครั้ง":"ส่งคำขอไม่สำเร็จ ลองอีกครั้ง"}</div>`; return; }
  const keepType=reqType; form={date,start,end}; reqType=keepType;
  toast("ส่งคำขอแล้ว · รอผู้ดูแลจัดสรรรถ"); calDate=date; await refresh();
}

  if(filters.status) list=list.filter(b=>b.status===filters.status);
  const statusTH={pending:"รออนุมัติ",approved:"อนุมัติแล้ว",cancelled:"ยกเลิกแล้ว"};
  const rows=list.map(b=>{ const c=carById(b.carId),dv=driverById(b.driverId),acts=[];
    if(b.status==="pending"&&b.carId) acts.push(`<button class="btn btn-ok btn-sm" data-approve="${b.id}">อนุมัติ</button>`);
    if(b.status!=="cancelled") acts.push(`<button class="btn btn-danger btn-sm" data-cancel="${b.id}">ยกเลิก</button>`);
    acts.push(`<button class="btn btn-ghost btn-sm" data-del="${b.id}">ลบ</button>`);
    const carCell=c?`${esc(c.name)}<br><span class="plate">${esc(c.plate)}</span>`:`<span style="color:var(--pending)">ยังไม่จัดรถ</span>`;
    const drvCell=b.driverId?(dv?esc(dv.name):`<span style="color:var(--cancel)">(ลบแล้ว)</span>`):(b.status==="approved"?`<span style="color:var(--ink-soft)">ขับเอง</span>`:"—");
    return `<tr class="${b.status==="cancelled"?"cancelled":""}"><td>${thaiDate(b.date)}</td><td class="mono">${b.start}–${b.end}</td>
      <td>${carCell}</td><td>${drvCell}</td><td>${esc(b.driver)}<br><span class="mono" style="font-size:11.5px;color:var(--ink-soft)">${esc(b.phone||"")}</span></td>
      <td><span class="reqbadge ${b.reqType==="patient"?"patient":"admin"}">${esc(REQ_LABEL[b.reqType]||"—")}</span><br><span style="font-size:11.5px;color:var(--ink-soft)">${esc(b.dept||"")}</span></td>
      <td>${esc(b.purpose||"")} <a class="req-detail" data-detail="${b.id}">รายละเอียด${b.fileUrl?" · ไฟล์":""}</a></td>
      <td><span class="tag ${b.status}">${statusTH[b.status]}</span></td><td><div class="act-row">${acts.join("")}</div></td></tr>`;
  }).join("");
  const carOpts=cars.map(c=>`<option value="${c.id}" ${String(filters.carId)===String(c.id)?"selected":""}>${esc(c.name)} (${esc(c.plate)})</option>`).join("");
  el.innerHTML=`
    <div class="panel pad" style="margin-top:18px">
      <div class="eyebrow">รอจัดสรร</div><h2 class="sec" style="margin:6px 0 14px">คำขอที่รอจัดรถ (${pend.length})</h2>
      <div class="req-list">${pendHtml}</div>
    </div>
    <div class="panel pad" style="margin-top:18px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div><div class="eyebrow">รายการทั้งหมด</div><h2 class="sec" style="margin:6px 0 0">ประวัติการจอง</h2></div>
        <div style="margin-left:auto;font-size:12px;color:var(--ink-soft)" class="mono">${bookings.length} รายการ</div></div>
      <div class="filters" style="margin-top:16px">
        <div class="field"><label>วันที่</label><input type="date" id="f-date" value="${filters.date}"></div>
        <div class="field"><label>รถ</label><select id="f-car"><option value="">ทุกคัน</option>${carOpts}</select></div>
        <div class="field"><label>สถานะ</label><select id="f-status"><option value="">ทั้งหมด</option>
          <option value="pending" ${filters.status==="pending"?"selected":""}>รออนุมัติ</option>
          <option value="approved" ${filters.status==="approved"?"selected":""}>อนุมัติแล้ว</option>
          <option value="cancelled" ${filters.status==="cancelled"?"selected":""}>ยกเลิกแล้ว</option></select></div>
        <div class="field" style="align-self:end"><button class="btn btn-ghost btn-sm" id="f-clear">ล้างตัวกรอง</button></div></div>
      ${list.length?`<div style="overflow-x:auto"><table><thead><tr><th>วันที่</th><th>เวลา</th><th>รถ</th><th>คนขับ</th><th>ผู้ขอ</th><th>ประเภท</th><th>รายละเอียด</th><th>สถานะ</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`
        :`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><div>ยังไม่มีรายการตามเงื่อนไขนี้</div></div>`}
    </div>
    <div class="panel pad" style="margin-top:18px"><div class="eyebrow">ทะเบียนรถ</div><h2 class="sec" style="margin:6px 0 16px">จัดการรถในระบบ (${cars.length} คัน)</h2>
      <div class="row-add"><div class="field"><label>ชื่อรุ่นรถ</label><input type="text" id="nc-name" placeholder="เช่น Toyota Yaris"></div>
        <div class="field"><label>ทะเบียน</label><input type="text" id="nc-plate" placeholder="เช่น กข-1111"></div>
        <div class="field"><label>ประเภท</label><select id="nc-type">${CAR_TYPES.map(t=>`<option>${t}</option>`).join("")}</select></div>
        <div class="field"><label>ที่นั่ง</label><input type="number" id="nc-seats" min="1" max="60" value="4"></div>
        <div class="field"><button class="btn btn-primary" id="nc-add">เพิ่มรถ</button></div></div>
      <div id="nc-alert"></div>
      <div class="car-list" style="margin-top:14px">${cars.map(c=>`<div class="car-card"><div class="car-ico">${carSvg}</div>
        <div class="car-meta"><div class="name">${esc(c.name)}</div><div class="sub"><span class="plate">${esc(c.plate)}</span><span>${esc(c.type)} · ${c.seats} ที่นั่ง</span></div></div>
        <button class="btn btn-danger btn-sm" data-delcar="${c.id}">ลบรถ</button></div>`).join("")}</div></div>
    <div class="panel pad" style="margin-top:18px"><div class="eyebrow">ทะเบียนคนขับ</div><h2 class="sec" style="margin:6px 0 16px">จัดการคนขับในระบบ (${drivers.length} คน)</h2>
      <div class="row-add" style="grid-template-columns:1.4fr 1fr auto"><div class="field"><label>ชื่อคนขับ</label><input type="text" id="nd-name" placeholder="เช่น สมชาย ใจดี"></div>
        <div class="field"><label>เบอร์โทร</label><input type="tel" id="nd-phone" inputmode="tel" placeholder="เช่น 081-234-5678"></div>
        <div class="field"><button class="btn btn-primary" id="nd-add">เพิ่มคนขับ</button></div></div>
      <div id="nd-alert"></div>
      <div class="car-list" style="margin-top:14px">${drivers.length?drivers.map(d=>`<div class="car-card"><div class="car-ico">${userSvg}</div>
        <div class="car-meta"><div class="name">${esc(d.name)}</div><div class="sub">${d.phone?`<span class="mono">${esc(d.phone)}</span>`:`<span style="color:var(--cancel)">ไม่ระบุเบอร์</span>`}</div></div>
        <button class="btn btn-danger btn-sm" data-deldrv="${d.id}">ลบ</button></div>`).join(""):`<div class="empty-state small">ยังไม่มีคนขับในระบบ</div>`}</div></div>${GOOGLE?adminEmailPanel():""}`;
  document.getElementById("f-date").addEventListener("change",e=>{filters.date=e.target.value;renderAdmin();});
  document.getElementById("f-car").addEventListener("change",e=>{filters.carId=e.target.value;renderAdmin();});
  document.getElementById("f-status").addEventListener("change",e=>{filters.status=e.target.value;renderAdmin();});
  document.getElementById("f-clear").addEventListener("click",()=>{filters={date:"",carId:"",status:""};renderAdmin();});
  el.querySelectorAll("[data-assign]").forEach(b=>b.addEventListener("click",()=>assignCar(b.dataset.assign)));
  el.querySelectorAll("[data-detail]").forEach(b=>b.addEventListener("click",()=>showDetails(b.dataset.detail)));
  el.querySelectorAll("[data-approve]").forEach(b=>b.addEventListener("click",()=>updateStatus(b.dataset.approve,"approved")));
  el.querySelectorAll("[data-cancel]").forEach(b=>b.addEventListener("click",()=>updateStatus(b.dataset.cancel,"cancelled")));
  el.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>deleteBooking(b.dataset.del)));
  document.getElementById("nc-add").addEventListener("click",addCar);
  el.querySelectorAll("[data-delcar]").forEach(b=>b.addEventListener("click",()=>deleteCar(b.dataset.delcar)));
  document.getElementById("nd-add").addEventListener("click",addDriver);
  el.querySelectorAll("[data-deldrv]").forEach(b=>b.addEventListener("click",()=>deleteDriver(b.dataset.deldrv)));
  if(GOOGLE){
    const ae=document.getElementById("ae-add"); if(ae) ae.addEventListener("click",addAdminEmail);
    el.querySelectorAll("[data-delae]").forEach(b=>b.addEventListener("click",()=>removeAdminEmail(b.dataset.delae)));
  }
}
function adminEmailList(){ return Array.from(adminSet()); }
function adminEmailPanel(){
  const fileSet=new Set((ADMIN_EMAILS||[]).map(e=>String(e).toLowerCase()));
  const items=adminEmailList().map(e=>{
    const fromFile=fileSet.has(e);
    return `<div class="car-card"><div class="car-ico">${lockSvg}</div>
      <div class="car-meta"><div class="name mono" style="font-size:13.5px">${esc(e)}</div>
        <div class="sub">${fromFile?'<span style="color:var(--ink-soft)">กำหนดในไฟล์ (แก้ในโค้ด)</span>':'<span style="color:var(--available)">เพิ่มในระบบ</span>'}</div></div>
      ${fromFile?"":`<button class="btn btn-danger btn-sm" data-delae="${esc(e)}">ลบ</button>`}</div>`;
  }).join("");
  return `<div class="panel pad" style="margin-top:18px"><div class="eyebrow">สิทธิ์ผู้ดูแล</div>
    <h2 class="sec" style="margin:6px 0 8px">อีเมลผู้ดูแล (${adminEmailList().length})</h2>
    <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 14px">อีเมลในรายการนี้จะเห็นแท็บจัดการและจัดสรรรถได้ · ต้องเป็นอีเมล @${esc(ALLOWED_DOMAIN)}</p>
    <div class="row-add" style="grid-template-columns:1fr auto"><div class="field"><label>เพิ่มอีเมลผู้ดูแล</label><input type="email" id="ae-input" placeholder="name@${esc(ALLOWED_DOMAIN)}"></div>
      <div class="field"><button class="btn btn-primary" id="ae-add">เพิ่ม</button></div></div>
    <div id="ae-alert"></div>
    <div class="car-list" style="margin-top:14px">${items}</div></div>`;
}
async function addAdminEmail(){
  if(busy) return;
  const v=document.getElementById("ae-input").value.trim().toLowerCase(),box=document.getElementById("ae-alert");
  if(!/^[^@\s]+@[^@\s]+$/.test(v)){ box.innerHTML=`<div class="alert err" style="margin-top:12px">อีเมลไม่ถูกต้อง</div>`; return; }
  if(ALLOWED_DOMAIN && v.split("@")[1]!==ALLOWED_DOMAIN.toLowerCase()){ box.innerHTML=`<div class="alert err" style="margin-top:12px">ต้องเป็นอีเมล @${esc(ALLOWED_DOMAIN)}</div>`; return; }
  const cur=(config.adminEmails&&typeof config.adminEmails==="string")?config.adminEmails.split(/[,\s]+/).filter(Boolean):[];
  if(cur.includes(v)||(ADMIN_EMAILS||[]).map(e=>e.toLowerCase()).includes(v)){ box.innerHTML=`<div class="alert err" style="margin-top:12px">อีเมลนี้เป็นผู้ดูแลอยู่แล้ว</div>`; return; }
  cur.push(v);
  busy=true; const res=await apiPost({action:"setConfig",key:"adminEmails",value:cur.join(",")}); busy=false;
  if(!res.ok){ box.innerHTML=`<div class="alert err" style="margin-top:12px">บันทึกไม่สำเร็จ</div>`; return; }
  toast("เพิ่มผู้ดูแลแล้ว"); await refresh();
}
async function removeAdminEmail(email){
  if(busy) return;
  if(GOOGLE && me && String(me.email).toLowerCase()===String(email).toLowerCase() && !confirm("นี่คืออีเมลของคุณเอง ลบแล้วคุณจะไม่เป็นผู้ดูแลอีก ดำเนินการต่อหรือไม่?")) return;
  const cur=(config.adminEmails&&typeof config.adminEmails==="string")?config.adminEmails.split(/[,\s]+/).filter(Boolean):[];
  const next=cur.filter(e=>e.toLowerCase()!==String(email).toLowerCase());
  busy=true; const res=await apiPost({action:"setConfig",key:"adminEmails",value:next.join(",")}); busy=false;
  if(!res.ok){ toast("ลบไม่สำเร็จ"); return; }
  toast("ลบผู้ดูแลแล้ว"); await refresh();
}
async function assignCar(id){
  if(busy) return;
  const b=bookings.find(x=>x.id===id); if(!b) return;
  const sel=document.getElementById("assign-"+id), carId=sel?sel.value:"";
  const dsel=document.getElementById("driver-"+id), driverId=dsel?dsel.value:"";
  if(!carId){ toast("เลือกรถก่อนจัดสรร"); return; }
  if(carConflict(carId,b.date,b.start,b.end,b.id)){ toast("รถคันนี้เพิ่งถูกจัดไปช่วงนี้ ลองคันอื่น"); await refresh(); return; }
  if(driverId && driverConflict(driverId,b.date,b.start,b.end,b.id)){ toast("คนขับคนนี้ติดงานช่วงเวลานี้ ลองคนอื่น"); await refresh(); return; }
  busy=true; const res=await apiPost({action:"assignCar",id,carId,driverId}); busy=false;
  if(!res.ok){ toast(res.error==="driverbusy"?"คนขับติดงานช่วงเวลานี้แล้ว":res.error==="conflict"?"รถคันนี้ถูกจัดไปแล้วในช่วงเวลานี้":"จัดสรรไม่สำเร็จ"); await refresh(); return; }
  toast("จัดสรรรถและคนขับแล้ว"); await refresh();
}
async function updateStatus(id,status){
  if(busy) return; const b=bookings.find(x=>x.id===id); if(!b) return;
  if(status==="approved"){ const c=carConflict(b.carId,b.date,b.start,b.end,b.id); if(c){ toast("อนุมัติไม่ได้ · เวลาทับกับรายการอื่น"); return; } }
  busy=true; const res=await apiPost({action:"updateStatus",id,status}); busy=false;
  if(!res.ok){ toast("ทำรายการไม่สำเร็จ"); return; }
  toast(status==="approved"?"อนุมัติแล้ว":"ยกเลิก/ปฏิเสธแล้ว"); await refresh();
}
async function deleteBooking(id){ if(busy) return; busy=true; const res=await apiPost({action:"deleteBooking",id}); busy=false; if(!res.ok){toast("ลบไม่สำเร็จ");return;} toast("ลบรายการจองแล้ว"); await refresh(); }
async function addCar(){
  if(busy) return;
  const name=document.getElementById("nc-name").value.trim(),plate=document.getElementById("nc-plate").value.trim();
  const type=document.getElementById("nc-type").value,seats=parseInt(document.getElementById("nc-seats").value)||1,box=document.getElementById("nc-alert");
  if(!name||!plate){ box.innerHTML=`<div class="alert err" style="margin-top:12px">กรอกชื่อรุ่นและทะเบียนให้ครบ</div>`; return; }
  busy=true; const res=await apiPost({action:"addCar",id:"c"+uid(),name,plate,type,seats}); busy=false;
  if(!res.ok){ box.innerHTML=`<div class="alert err" style="margin-top:12px">${res.error==="dupplate"?"ทะเบียนนี้มีอยู่แล้ว":"เพิ่มไม่สำเร็จ"}</div>`; return; }
  toast("เพิ่มรถเข้าระบบแล้ว"); await refresh();
}
async function deleteCar(id){
  if(busy) return; const c=carById(id); if(!c) return;
  const linked=bookings.filter(b=>String(b.carId)===String(id)&&b.status!=="cancelled").length;
  if(linked>0 && !confirm(`รถคันนี้มีการจองค้างอยู่ ${linked} รายการ — ลบรถและรายการจองทั้งหมดเลยหรือไม่?`)) return;
  busy=true; const res=await apiPost({action:"deleteCar",id}); busy=false; if(!res.ok){toast("ลบไม่สำเร็จ");return;}
  toast("ลบรถออกจากระบบแล้ว"); await refresh();
}
async function addDriver(){
  if(busy) return;
  const name=document.getElementById("nd-name").value.trim(),phone=document.getElementById("nd-phone").value.trim(),box=document.getElementById("nd-alert");
  if(!name){ box.innerHTML=`<div class="alert err" style="margin-top:12px">กรอกชื่อคนขับ</div>`; return; }
  busy=true; const res=await apiPost({action:"addDriver",id:"d"+uid(),name,phone}); busy=false;
  if(!res.ok){ box.innerHTML=`<div class="alert err" style="margin-top:12px">เพิ่มไม่สำเร็จ</div>`; return; }
  toast("เพิ่มคนขับแล้ว"); await refresh();
}
async function deleteDriver(id){
  if(busy) return; const d=driverById(id); if(!d) return;
  const linked=bookings.filter(b=>String(b.driverId)===String(id)&&b.status!=="cancelled").length;
  if(linked>0 && !confirm(`คนขับคนนี้ถูกจัดให้งานที่ยังไม่จบ ${linked} รายการ — ลบแล้วงานเหล่านั้นจะกลายเป็น “ขับเอง/ยังไม่ระบุ” ดำเนินการต่อหรือไม่?`)) return;
  busy=true; const res=await apiPost({action:"deleteDriver",id}); busy=false; if(!res.ok){toast("ลบไม่สำเร็จ");return;}
  toast("ลบคนขับออกจากระบบแล้ว"); await refresh();
}

function render(){
  renderTopBar(); renderBanner();
  ["book","calendar","admin"].forEach(n=>document.getElementById("view-"+n).hidden=(n!==view));
  if(view==="book") renderBook(); else if(view==="calendar") renderCalendar(); else renderAdmin();
}
(async()=>{
  if(GOOGLE){
    renderLogin("");                // ซ่อนแอป แสดงหน้าล็อกอินทันที (ปุ่มขึ้นเมื่อ Google โหลดเสร็จ)
    me=lsGet("fleet:me");
    initGoogle();
    if(REMOTE) setInterval(()=>{ if(view!=="book" && !busy && me && idToken) refresh(); }, 20000);
    return;
  }
  // โหมดทดลอง / ยังไม่ตั้ง Google Login
  me=lsGet("fleet:me");
  await refresh();
  render();
  if(!me) askName(true);
  if(REMOTE) setInterval(()=>{ if(view!=="book" && !busy) refresh(); }, 20000);
})();
</script>
</body>
</html>
